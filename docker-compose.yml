# Single-box nasazení: nginx (SPA + reverse-proxy /api) → .NET API → PostgreSQL.
# Spuštění z adresáře vystavenocz:
# `DB_PASSWORD=<silné-heslo> JWT_SECRET=<min-32-znaků> STRIPE_SECRET_KEY=<sk_test...> INTEGRATIONS_SECRET_ENCRYPTION_KEY=<openssl rand -base64 32> docker compose up --build`
# Vyžaduje sousední repo ../vystaveno-api (build kontext API). App poběží na http://localhost:8080.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vystaveno
      POSTGRES_USER: vystaveno
      POSTGRES_PASSWORD: ${DB_PASSWORD:?nastav DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vystaveno']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../vystaveno-api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: 8080
      Database__ConnectionString: 'Host=db;Database=vystaveno;Username=vystaveno;Password=${DB_PASSWORD:?nastav DB_PASSWORD}'
      Jwt__Secret: ${JWT_SECRET:?nastav JWT_SECRET (min. 32 znaků)}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:?nastav STRIPE_SECRET_KEY}
      Integrations__SecretEncryptionKey: ${INTEGRATIONS_SECRET_ENCRYPTION_KEY:?nastav INTEGRATIONS_SECRET_ENCRYPTION_KEY (openssl rand -base64 32)}
      # Jen pro interní billing/backoffice adaptér: bez klíče kvalifikace referralů i investor metriky fail-closed vrátí 503.
      Growth__OperatorKey: ${GROWTH_OPERATOR_KEY:-}
      BlobStorage__LocalRootPath: /var/lib/vystaveno/files
      Payments__PortalBaseUrl: ${PAYMENTS_PORTAL_BASE_URL:-http://localhost:8080}
      # SMTP pro odeslání faktur, pozvánek a nákupních objednávek. Bez EMAIL_HOST je v dev/testu
      # použit bezpečný logging sender; produkce pak nesmí tvrdit, že e-mail došel.
      Email__Host: ${EMAIL_HOST:-}
      Email__Port: ${EMAIL_PORT:-587}
      Email__From: ${EMAIL_FROM:-}
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      # Web je same-origin přes nginx; desktop (Tauri) volá cross-origin → povol jeho originy (ops).
      Cors__AllowedOrigins__0: 'tauri://localhost'
      Cors__AllowedOrigins__1: 'http://tauri.localhost'
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '8080'
    volumes:
      - api_files:/var/lib/vystaveno/files

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  pgdata:
  api_files:
