<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Anti-FOUC: tmavý režim (default identity v0.4) před vykreslením; uložená volba má přednost. -->
    <script>
      ;(function () {
        try {
          if (localStorage.getItem('vystaveno:theme') !== 'light')
            document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>

    <title>Vystaveno.cz</title>
    <meta
      name="description"
      content="Jeden systém pro celý provoz — pokladna, restaurace, sklad, docházka, rezervace i fakturace. Modulární: platíš jen za to, co používáš."
    />
    <meta name="theme-color" content="#0a0411" />

    <!-- Favicony / ikony — SVG (nový brand) má přednost, PNG/ICO jako fallback -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph (plné SEO/meta řeší F2-31, iOS splash F8-54) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vystaveno.cz — Jeden systém pro celý provoz" />
    <meta
      property="og:description"
      content="Prodej, faktura, rezervace — na jeden ťuk. Modulární provozní systém pro kavárny, restaurace, salony i řemeslo."
    />
    <meta property="og:image" content="/og-image.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
