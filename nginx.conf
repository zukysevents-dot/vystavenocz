# nginx: servíruje SPA (statiku) a reverse-proxuje /api a /health na backend (same-origin → bez CORS).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Bezpečnostní hlavičky pro statiku. CSP záměrně neřešíme zde (app inline styly/PWA) — follow-up.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API → backend (docker service "api" na :8080). Prefix /api/ se zachová (proxy_pass končí /api/).
    location /api/ {
        # Backend povoluje 10 MiB soubor; rezerva pokryje multipart hlavičky a boundary.
        client_max_body_size 12m;
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health endpointy backendu (live/ready) — pro orchestrátor / ruční ověření.
    location /health/ {
        proxy_pass http://api:8080/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashované assety (vite) — neměnné, dlouhá cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — klientské routy (vue-router history mode) doručí index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
