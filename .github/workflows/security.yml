name: Security

on:
  schedule:
    # každé pondělí 6:00 UTC — zachytí nově publikované CVE i bez změny kódu
    - cron: '0 6 * * 1'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Audit all dependencies
        if: always()
        run: npm audit --audit-level=high
