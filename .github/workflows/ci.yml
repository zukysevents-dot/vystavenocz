name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Guard: trackovaný smí být jen .env.example a .env.production (jen veřejná API URL) — nic se secrety
      - name: Check no tracked env files
        run: |
          tracked=$(git ls-files | grep -E '(^|/)\.env' | grep -vE '\.env\.(example|production)$' || true)
          if [ -n "$tracked" ]; then echo "Tracked env files: $tracked"; exit 1; fi

      - name: Test VPS reliability scripts
        run: |
          shellcheck -x ops/*.sh ops/lib/*.sh ops/tests/*.sh
          bash ops/tests/vps-reliability.test.sh

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
